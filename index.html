<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

      background: #0d0d1a;

      font-family: monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    h1 {
      font-size: 2.5rem;
      letter-spacing: 0.15em;
      margin-bottom: 32px;
    }
    .menu {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 240px;
    }
    .menu a {
      display: block;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 14px 24px;
      text-decoration: none;
      color: #ffffff;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-align: center;
      transition: border-color 0.2s, color 0.2s, transform 0.1s;
    }
    .menu a:hover {
      border-color: #44ff88;
      color: #44ff88;
      transform: translateY(-2px);
    }
