<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Idle Life</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      color: #ffffff;
      font-family: monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
    }
    nav {
      position: absolute;
      top: 20px;
      left: 20px;
    }
    nav a {
      color: #666;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    nav a:hover { color: #44ff88; }
    h1 {
      font-size: 2rem;
      letter-spacing: 0.1em;
      color: #44ff88;
      margin-bottom: 32px;
    }
    #layout {
      display: grid;
      grid-template-columns: 1fr 1.8fr 1fr;
      gap: 20px;
      width: 100%;
      max-width: 1200px;
      align-items: start;
    }
    @media (max-width: 760px) {
      #layout {
        grid-template-columns: 1fr;
      }
    }
    .column {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #col-middle,
    #col-right {
      position: relative;
    }
    #col-middle {
      align-items: center;
      text-align: center;
    }
    #col-middle-scroll,
    #col-right-scroll {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-height: calc(100vh - 160px);
      overflow-y: auto;
      overflow-x: hidden;
    }
    #col-middle-scroll {
      align-items: center;
      text-align: center;
    }
    .scroll-down-indicator {
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #1a1a2e;
      border: 1px solid #44ff88;
      color: #44ff88;
      font-size: 0.9rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.15s;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }
    .scroll-down-indicator.visible {
      opacity: 1;
      pointer-events: auto;
    }
    .scroll-down-indicator:hover {
      transform: translateX(-50%) translateY(2px);
      background: #0d0d1a;
    }
    #age-display {
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      color: #888;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .fast-forward-btn {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      color: #888;
      font-family: monospace;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      padding: 3px 8px;
      cursor: pointer;
    }
    .fast-forward-btn:hover {
      border-color: #44ff88;
      color: #44ff88;
    }
    #age-display .age-value {
      color: #44ff88;
      font-weight: bold;
    }
    #stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }
    .stat {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 16px;
      text-align: center;
      flex: 1;
      min-width: 100px;
    }
    .stat .label {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .stat .value {
      font-size: 1.05rem;
      font-weight: bold;
    }
    .value.positive { color: #44ff88; }
    .value.negative { color: #ff5566; }
    .value.neutral { color: #ffffff; }
    [data-money], [data-tooltip-type] { cursor: help; border-bottom: 1px dotted currentColor; }
    #tooltip {
      display: none;
      position: fixed;
      background: #1a1a2e;
      border: 1px solid #44ff88;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.75rem;
      font-family: monospace;
      color: #ffffff;
      pointer-events: none;
      white-space: pre-line;
      z-index: 100;
    }
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13, 13, 26, 0.75);
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 20px;
    }
    #modal-overlay.visible {
      display: flex;
    }
    #modal-box {
      background: #14141f;
      border: 1px solid #44ff88;
      border-radius: 8px;
      padding: 24px;
      max-width: 420px;
      width: 100%;
      text-align: left;
    }
    #modal-message {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #eee;
      margin-bottom: 22px;
      white-space: pre-line;
    }
    #modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .modal-btn {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 10px 18px;
      font-family: monospace;
      font-size: 0.85rem;
      color: #ffffff;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .modal-btn:hover {
      border-color: #44ff88;
    }
    #modal-confirm {
      border-color: #ff5566;
      color: #ff5566;
    }
    #modal-confirm:hover {
      background: rgba(255, 85, 102, 0.12);
      border-color: #ff5566;
    }
    .section-card {
      background: #14141f;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 14px 18px;
      text-align: left;
      width: 100%;
    }
    .section-card h3 {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: #44ff88;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .section-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.8rem;
      color: #ccc;
      padding: 3px 0;
    }
    .section-line .positive { color: #44ff88; }
    .section-line .negative { color: #ff5566; }
    .total-line {
      font-weight: bold;
      border-top: 1px solid #2a2a4a;
      margin-top: 2px;
      padding-top: 8px;
    }
    .total-value-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-ring {
      transform: rotate(-90deg);
      flex-shrink: 0;
    }
    .progress-ring-bg {
      fill: none;
      stroke: #2a2a4a;
      stroke-width: 9;
    }
    .progress-ring-fill {
      fill: none;
      stroke: #44ff88;
      stroke-width: 9;
      stroke-linecap: butt;
      transition: stroke-dashoffset 0.2s linear;
    }
    .developing-btn-wrap {
      position: relative;
    }
    .developing-btn-wrap .progress-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-90deg);
      pointer-events: none;
      filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.5));
    }
    #scene {
      width: 100%;
      margin-top: 28px;
    }
    #prompt {
      font-size: 1.05rem;
      margin-bottom: 24px;
      line-height: 1.6;
      color: #eee;
    }
    #choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .choice-btn {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 16px 20px;
      text-align: left;
      color: #ffffff;
      font-family: monospace;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.1s;
    }
    .choice-btn:hover {
      border-color: #44ff88;
      transform: translateY(-2px);
    }
    .choice-btn .choice-label {
      font-size: 1rem;
      color: #44ff88;
      margin-bottom: 4px;
    }
    .choice-btn .choice-desc {
      font-size: 0.8rem;
      color: #888;
    }
    .choice-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }
    .choice-btn:disabled:hover {
      border-color: #2a2a4a;
    }
    .choice-btn .choice-cost {
      display: none;
    }
    .choice-btn.locked {
      display: flex;
      flex-direction: row-reverse;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
    }
    .choice-btn.locked:disabled {
      opacity: 1;
    }
    .choice-btn.locked > *:not(.choice-label):not(.choice-cost) {
      display: none;
    }
    .choice-btn.locked .choice-label {
      margin-bottom: 0;
      color: #888;
    }
    .choice-btn.locked .choice-cost {
      display: block;
      color: #ff5566;
      font-weight: bold;
      font-size: 0.85rem;
    }
    .action-group {
      text-align: left;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    .action-group:last-child {
      margin-bottom: 0;
    }
    .action-group h4 {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: #44ff88;
      text-transform: uppercase;
    }
    .period-select {
      margin-top: 6px;
      background: #0d0d1a;
      border: 1px solid #2a2a4a;
      border-radius: 4px;
      color: #888;
      font-family: monospace;
      font-size: 0.65rem;
      padding: 2px 4px;
    }
    .period-select:hover { border-color: #44ff88; color: #44ff88; }
  </style>
</head>
<body>
  <nav><a href="../index.html">← back</a></nav>
  <h1>Idle Life</h1>
  <div id="layout">
    <div id="col-left" class="column"></div>
    <div id="col-middle" class="column">
      <div id="col-middle-scroll">
        <div id="age-display">
          AGE: <span class="age-value" id="age-value">18.0000</span> years
          <button id="fast-forward-month" class="fast-forward-btn">+ Month</button>
          <button id="fast-forward-year" class="fast-forward-btn">+ Year</button>
        </div>
        <div id="stats">
          <div class="stat">
            <div class="label">Net Worth</div>
            <div class="value neutral" id="stat-networth">$0</div>
          </div>
          <div class="stat">
            <div class="label">Cash</div>
            <div class="value neutral" id="stat-cash">$0</div>
          </div>
        </div>
        <div id="scene">
          <div id="prompt"></div>
          <div id="choices"></div>
        </div>
      </div>
      <button id="scroll-down-indicator-middle" class="scroll-down-indicator" aria-label="Scroll to bottom">▼</button>
    </div>
    <div id="col-right" class="column">
      <div id="col-right-scroll"></div>
      <button id="scroll-down-indicator-right" class="scroll-down-indicator" aria-label="Scroll to bottom">▼</button>
    </div>
  </div>
  <div id="tooltip"></div>
  <div id="modal-overlay">
    <div id="modal-box">
      <div id="modal-message"></div>
      <div id="modal-actions">
        <button id="modal-cancel" class="modal-btn">Cancel</button>
        <button id="modal-confirm" class="modal-btn">Confirm</button>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
