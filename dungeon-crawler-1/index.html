<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dungeon Crawler 1</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    #app {
      width: 100%;
      max-width: 720px;
    }

    /* ── Buttons ── */
    button {
      background: #c9a84c;
      color: #0d0d1a;
      border: none;
      border-radius: 6px;
      padding: 11px 24px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s;
    }
    button:hover:not(:disabled) { background: #e0bf6a; }
    button:disabled { background: #2a2a3a; color: #555; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: #aaa;
      border: 1px solid #3a3a5a;
      font-weight: normal;
    }
    .btn-secondary:hover:not(:disabled) { background: #1a1a2e; color: #fff; border-color: #5a5a8a; }
    .btn-secondary.active { border-color: #c9a84c; color: #c9a84c; background: #1e1800; }

    .btn-buy {
      background: transparent;
      color: #44ff88;
      border: 1px solid #44ff88;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: normal;
    }
    .btn-buy:hover:not(:disabled) { background: #0a2a1a; }

    .btn-danger {
      background: transparent;
      color: #ff6666;
      border: 1px solid #ff6666;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: normal;
    }
    .btn-danger:hover:not(:disabled) { background: #2a0a0a; }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1e1e3a;
    }
    .phase-label { color: #666; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.12em; }
    .gold-badge {
      background: #1e1800;
      border: 1px solid #c9a84c;
      color: #c9a84c;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.95rem;
      font-weight: bold;
    }
    .timer-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }
    .room-timer {
      font-size: 1.1rem;
      font-weight: bold;
      color: #aaa;
      min-width: 38px;
      text-align: right;
    }
    .room-timer.timer-urgent { color: #e55; animation: timer-pulse 0.6s ease-in-out infinite alternate; }
    @keyframes timer-pulse { from { opacity: 1; } to { opacity: 0.4; } }
    .btn-timer-pause {
      background: #1a1a2e;
      border: 1px solid #444;
      color: #ccc;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-timer-pause:hover { border-color: #888; color: #fff; }
    .timer-pause-tip {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1230;
      border: 1px solid #554;
      color: #cca;
      font-size: 0.78rem;
      padding: 7px 12px;
      border-radius: 8px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    /* ── Cards ── */
    .card {
      width: 58px;
      height: 90px;
      background: #1e1030;
      border: 2px solid #3a2a5a;
      border-radius: 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.15s, transform 0.1s;
    }
    .card.selectable { cursor: pointer; border-color: #c9a84c; }
    .card.selectable:hover { border-color: #e0bf6a; transform: translateY(-3px); }
    .card.tier-2 { border-color: #1a3060; }
    .card.tier-3 { border-color: #4a1a6a; }
    .card.selectable.tier-2 { border-color: #c9a84c; }
    .card.selectable.tier-3 { border-color: #c9a84c; }
    .card-power { font-size: 1.5rem; font-weight: bold; color: #fff; line-height: 1; }
    .card-sprite { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; margin: 2px 0; }
    .card-sprite svg { width: 36px; height: 36px; }
    .card-sub { font-size: 0.44rem; text-transform: uppercase; color: #555; letter-spacing: 0.04em; text-align: center; }
    .sc-sprite { width: 52px; height: 52px; display: flex; align-items: center; justify-content: center; margin: 2px 0; }
    .sc-sprite svg { width: 52px; height: 52px; }

    .card-row { display: flex; flex-wrap: wrap; gap: 8px; }

    /* ── Panels ── */
    .panel {
      background: #111128;
      border: 1px solid #1e1e3a;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 14px;
    }
    .panel-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #555;
      margin-bottom: 12px;
    }
    .panel-title span { color: #44ff88; margin-left: 8px; font-size: 0.8rem; }

    /* ── Room layout ── */
    .room-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .room-grid .full-width { grid-column: 1 / -1; }

    /* ── Shop cards ── */
    .shop-panel { margin-top: 14px; }
    .shop-tier-badge { color: #c9a84c; margin-left: 8px; font-size: 0.8rem; }
    .shop-items { display: flex; gap: 9px; flex-wrap: wrap; }
    .shop-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      background: #0e0e22;
      border: 1px solid #2a2a4a;
      border-radius: 9px;
      padding: 10px 10px 8px;
      width: 96px;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .shop-card:hover { border-color: #5a5a8a; }
    .sc-header { display: flex; justify-content: space-between; align-items: baseline; width: 100%; }
    .sc-tier { font-size: 0.62rem; font-weight: bold; letter-spacing: 0.05em; }
    .sc-tier-1 { color: #888; }
    .sc-tier-2 { color: #4488ff; }
    .sc-tier-3 { color: #cc44ff; }
    .sc-power { font-size: 1.45rem; font-weight: bold; color: #fff; }
    .sc-name { font-size: 0.72rem; color: #c8b060; font-weight: bold; text-align: center; width: 100%; }
    .sc-ability {
      font-size: 0.62rem;
      color: #666;
      font-style: italic;
      text-align: center;
      line-height: 1.35;
      flex: 1;
      min-height: 28px;
    }
    .sc-none { color: #333; }

    .shop-item { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }

    .mode-hint {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #c9a84c;
      font-style: italic;
    }

    .boss-preview-sprite { width: 60px; height: 72px; margin: 0 auto 8px; display: block; }
    .boss-preview-sprite svg { width: 100%; height: 100%; }
    .boss-sprite { width: 110px; height: 132px; margin: 0 auto 10px; display: block; }
    .boss-sprite svg { width: 100%; height: 100%; }
    .boss-preview .boss-name { color: #cc4444; font-size: 1.1rem; display: block; margin-bottom: 4px; }
    .boss-preview .boss-stat { color: #888; font-size: 0.85rem; display: block; margin-bottom: 2px; }
    .boss-preview .boss-per-card { color: #cc6644; font-size: 0.78rem; margin-left: 5px; }
    .boss-preview .boss-threat { color: #cc4444; font-size: 0.9rem; font-weight: bold; display: block; margin-bottom: 4px; }
    .boss-preview .boss-threat-note { color: #774444; font-size: 0.75rem; font-weight: normal; }
    .boss-preview .boss-ability-text { color: #666; font-size: 0.82rem; font-style: italic; }
    .boss-scaling-line { font-size: 0.72rem; color: #664433; margin-top: 2px; margin-bottom: 4px; }

    /* ── Battle ── */
    .battle-boss-card {
      text-align: center;
      padding: 24px;
      background: #120808;
      border: 1px solid #3a1010;
      border-radius: 10px;
      margin-bottom: 14px;
    }
    .battle-boss-card h2 { font-size: 2rem; color: #cc4444; margin-bottom: 8px; }
    .battle-boss-card .boss-power-text { color: #aaa; font-size: 1rem; }
    .battle-boss-card .boss-ability-text { color: #666; font-size: 0.85rem; font-style: italic; margin-top: 6px; }

    .calc-panel { display: flex; flex-direction: column; gap: 10px; }
    .calc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: #888;
    }
    .calc-row strong { color: #e0e0e0; font-size: 1rem; }
    .calc-row.verdict {
      padding-top: 12px;
      border-top: 1px solid #1e1e3a;
      font-size: 1rem;
      color: #bbb;
    }
    .calc-row.verdict strong { font-size: 1.2rem; }

    .result-banner {
      text-align: center;
      font-size: 2.2rem;
      font-weight: bold;
      padding: 22px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .result-win { color: #44ff88; background: #071a0f; border: 1px solid #44ff88; }
    .result-lose { color: #ff4444; background: #1a0707; border: 1px solid #ff4444; }

    .reward-text { text-align: center; color: #c9a84c; font-size: 0.95rem; margin-bottom: 14px; }

    .color-win { color: #44ff88; }
    .color-lose { color: #ff4444; }

    /* ── Title ── */
    .title-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 85vh;
      text-align: center;
      gap: 22px;
    }
    .title-screen h1 { font-size: 2.8rem; color: #c9a84c; letter-spacing: 0.08em; }
    .title-screen .subtitle { color: #555; font-size: 1rem; }
    .title-screen .starting-box {
      background: #111128;
      border: 1px solid #1e1e3a;
      border-radius: 10px;
      padding: 18px 28px;
      text-align: left;
      font-size: 0.9rem;
      color: #888;
      line-height: 1.9;
    }
    .title-screen .starting-box strong { color: #e0e0e0; }

    /* ── End screens ── */
    .end-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 85vh;
      text-align: center;
      gap: 16px;
    }
    .end-screen h1 { font-size: 3rem; }
    .end-screen p { color: #888; font-size: 0.95rem; }
    .end-screen .final-deck { margin: 10px 0; }

    .empty-text { color: #444; font-style: italic; font-size: 0.85rem; }

    .proceed-btn { width: 100%; padding: 15px; font-size: 1.05rem; margin-top: 6px; }

    .battle-actions {
      display: flex;
      gap: 10px;
      margin-top: 6px;
      align-items: stretch;
    }
    .battle-actions .proceed-btn { flex: 1; width: auto; margin-top: 0; }
    .battle-actions #btn-replay-battle { padding: 15px 20px; font-size: 1.0rem; white-space: nowrap; }

    /* ── Battle animations ── */
    @keyframes bossShake {
      0%, 100% { transform: translateX(0); }
      15%  { transform: translateX(-10px); }
      30%  { transform: translateX(10px); }
      45%  { transform: translateX(-7px); }
      60%  { transform: translateX(7px); }
      75%  { transform: translateX(-4px); }
      90%  { transform: translateX(4px); }
    }
    @keyframes bossDie {
      0%   { transform: scale(1) rotate(0deg); opacity: 1; }
      40%  { transform: scale(1.08) rotate(-4deg); opacity: 0.6; }
      100% { transform: scale(0.15) rotate(20deg); opacity: 0; }
    }
    @keyframes cardCharge {
      0%   { transform: translateY(0) scale(1); box-shadow: none; }
      100% { transform: translateY(-13px) scale(1.15); box-shadow: 0 0 22px #44ff88cc; }
    }
    @keyframes cardFizzle {
      0%, 100% { transform: translateX(0); filter: brightness(1); }
      20%  { transform: translateX(-5px); filter: brightness(1.6); }
      50%  { transform: translateX(5px); }
      70%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); filter: brightness(0.7); }
    }
    @keyframes dmgFloat {
      0%   { transform: translate(-50%, 0) scale(0.5); opacity: 1; }
      15%  { transform: translate(-50%, -10px) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -58px) scale(0.9); opacity: 0; }
    }

    .battle-screen { display: flex; flex-direction: column; }

    .boss-section { display: flex; justify-content: center; padding: 16px 0 8px; }

    .boss-battle-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: min(300px, 92%);
    }

    .boss-card {
      width: 100%;
      text-align: center;
      background: #120808;
      border: 2px solid #5a1010;
      border-radius: 12px;
      padding: 18px 24px;
      opacity: 0;
      transform: translateY(-50px);
      transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: visible;
    }
    .boss-card.enter    { opacity: 1; transform: translateY(0); }
    .boss-card.impact   { animation: bossShake 0.5s ease; }
    .boss-card.defeated { animation: bossDie 0.65s ease 0.1s forwards; }
    .boss-card.survived { border-color: #cc2222; box-shadow: 0 0 30px #ff000055; }

    .boss-name-display  { font-size: 1.5rem; color: #cc4444; margin-bottom: 4px; }
    .boss-ability-label { font-size: 0.78rem; color: #555; font-style: italic; margin-top: 4px; }

    /* HP bar */
    .boss-hp-bar-wrap {
      width: 100%;
      height: 11px;
      background: #2a0808;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
      border: 1px solid #4a1010;
    }
    .boss-hp-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #991a1a, #dd3333);
      border-radius: 6px;
      transition: width 0.35s ease;
    }
    .boss-hp-text {
      font-size: 0.76rem;
      color: #774444;
      margin-top: 4px;
      font-variant-numeric: tabular-nums;
      align-self: flex-end;
    }

    /* Damage floating numbers */
    .damage-number {
      position: absolute;
      top: 25%;
      left: 50%;
      font-size: 2.2rem;
      font-weight: bold;
      color: #ffdd44;
      text-shadow: 0 0 14px #ffdd44aa;
      pointer-events: none;
      animation: dmgFloat 1.15s ease-out forwards;
      z-index: 20;
      white-space: nowrap;
    }
    .damage-number.damage-banner   { color: #c9a84c; }
    .damage-number.damage-redirect { color: #88aaff; font-size: 1.6rem; }
    .damage-number.damage-null     { color: #664444; font-size: 0.95rem; top: 38%; }

    /* Card pop labels (war-cry, empower, redirect) — appended to body, position:fixed */
    @keyframes cardPopFloat {
      0%   { transform: translateX(-50%) translateY(0) scale(0.8); opacity: 1; }
      100% { transform: translateX(-50%) translateY(-48px) scale(1.05); opacity: 0; }
    }
    .warcry-pop, .empower-pop, .redirect-pop {
      position: fixed;
      font-size: 0.62rem;
      font-weight: bold;
      white-space: nowrap;
      pointer-events: none;
      animation: cardPopFloat 1.0s ease-out forwards;
      z-index: 9999;
      border-radius: 3px;
      padding: 2px 6px;
    }
    .warcry-pop   { color: #ff8844; background: #2a1500; border: 1px solid #ff6622; }
    .empower-pop  { color: #44ffaa; background: #002a1a; border: 1px solid #22cc88; }
    .redirect-pop { color: #88aaff; background: #001a2a; border: 1px solid #4466cc; }
    .inspire-pop  { color: #ffdd44; background: #2a2200; border: 1px solid #ddaa00; }

    /* Persistent redirect badge — stays for the rest of the battle */
    @keyframes redirectBadgeIn {
      0%   { transform: translateX(-50%) scale(0.5); opacity: 0; }
      60%  { transform: translateX(-50%) scale(1.15); opacity: 1; }
      100% { transform: translateX(-50%) scale(1.0); opacity: 1; }
    }
    .redirect-badge {
      position: fixed;
      color: #88aaff;
      background: #001a2a;
      border: 1px solid #4466cc;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.6rem;
      font-weight: bold;
      pointer-events: none;
      z-index: 9999;
      transform: translateX(-50%);
      animation: redirectBadgeIn 0.35s ease forwards;
    }

    /* Redirect target flash */
    @keyframes redirectFlash {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 20px #88aaffcc; border-color: #88aaff !important; }
    }
    .battle-card.redirect-target { animation: redirectFlash 0.55s ease; }

    .cards-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 8px 0 14px;
    }
    .battle-cards-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }

    .battle-card {
      width: 52px;
      height: 84px;
      border-radius: 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .battle-card.enter     { opacity: var(--card-opacity, 1); transform: translateY(0); }
    .battle-card.effective { --card-opacity: 1; background: #0e1e18; border: 2px solid #44ff88; }
    .battle-card.nullified { --card-opacity: 0.28; background: #111; border: 2px solid #1e1e1e; }
    .battle-card.nullified .card-power { color: #444; }
    .battle-card.nullified::after {
      content: '✕';
      position: absolute;
      font-size: 1.4rem;
      color: #cc2222;
      opacity: 0.85;
    }
    .battle-card.attacking { animation: cardCharge 0.28s ease forwards; }
    .battle-card.fizzling  { animation: cardFizzle 0.32s ease forwards; border-color: #cc3333 !important; }
    .battle-card.used      { opacity: 0.22 !important; transition: opacity 0.4s ease; }
    .battle-card.nullified.used { opacity: 0.12 !important; }

    .ability-note {
      font-size: 0.8rem;
      color: #555;
      font-style: italic;
      text-align: center;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .ability-note.visible { opacity: 1; }

    .battle-outcome { opacity: 0; transition: opacity 0.5s; padding-bottom: 10px; }
    .battle-outcome.visible { opacity: 1; }

    /* ── Treasure screen ── */
    .treasure-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }
    .treasure-reward { text-align: center; margin-bottom: 6px; }
    .treasure-deck-panel { width: 100%; margin-bottom: 10px; }
    .treasure-prompt {
      color: #888;
      font-size: 0.9rem;
      margin: 14px 0 20px;
      text-align: center;
    }
    .treasure-final-note {
      color: #444;
      font-size: 0.8rem;
      font-style: italic;
      margin-top: 20px;
      text-align: center;
    }
    .treasure-grid {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
    }
    .treasure-card {
      flex: 1;
      min-width: 150px;
      max-width: 210px;
      background: #111128;
      border: 2px solid #3a2a5a;
      border-radius: 10px;
      padding: 18px 14px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s, background 0.15s;
      text-align: center;
    }
    .treasure-card:hover {
      border-color: #c9a84c;
      background: #1a1525;
      transform: translateY(-5px);
    }
    .treasure-card .t-sprite {
      width: 52px;
      height: 52px;
      margin: 0 auto 10px;
    }
    .treasure-card .t-sprite svg { width: 100%; height: 100%; }
    .treasure-card .t-name {
      font-weight: bold;
      color: #d0a0ff;
      font-size: 1rem;
      margin-bottom: 5px;
    }
    .treasure-card .t-type {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #554466;
      margin-bottom: 10px;
    }
    .treasure-card .t-desc {
      color: #888;
      font-size: 0.8rem;
      line-height: 1.55;
    }

    /* ── Relics ── */
    .relics-row { display: flex; flex-wrap: wrap; gap: 7px; }
    .relic-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #1a1030;
      border: 1px solid #5a3a8a;
      border-radius: 20px;
      padding: 3px 10px 3px 5px;
      font-size: 0.75rem;
      color: #d0a0ff;
      cursor: default;
    }
    .relic-chip-sprite {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .relic-chip-sprite svg { width: 100%; height: 100%; }

    /* ── Battle card: War Banner doubled ── */
    .battle-card.doubled { border-color: #ffaa00 !important; }
    .battle-card.doubled .card-sub { color: #ffaa00; font-weight: bold; }

    /* ── Boss ability negated tag ── */
    .negated-tag {
      display: inline-block;
      background: #1a2a1a;
      border: 1px solid #44ff88;
      color: #44ff88;
