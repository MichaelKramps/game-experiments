<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sector Zero</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #080a08;
      background-image:
        linear-gradient(rgba(0, 180, 60, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 180, 60, 0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      color: #c8d4c0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    #app { width: 100%; max-width: 1100px; }

    #home-link {
      position: fixed;
      top: 12px;
      left: 14px;
      color: #2a3a2a;
      font-size: 0.8rem;
      text-decoration: none;
    }
    #home-link:hover { color: #55aa66; }

    /* ── hud ── */
    .hud {
      position: fixed;
      top: 48px;
      right: 64px;
      display: flex;
      gap: 48px;
      z-index: 100;
    }
    .hud-resource {
      font-size: 3rem;
      color: #c9a84c;
      cursor: default;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .coin {
      display: inline-block;
      width: 0.7em;
      height: 0.7em;
      background: radial-gradient(circle at 35% 35%, #f0d060, #c9a84c 55%, #8a6a20);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── screens ── */
    .screen { padding: 24px 0 60px; }

    .title {
      font-size: 2rem;
      text-align: center;
      color: #33cc66;
      text-shadow: 0 0 20px rgba(51, 204, 102, 0.25);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #6a8a6a;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }
    .section-title { font-size: 1.1rem; color: #33cc66; letter-spacing: 0.5px; }

    .gold  { color: #c9a84c; }
    .red   { color: #d95555; }
    .hp-stat  { color: #e05555; }
    .atk-stat { color: #5599dd; }

    /* ── shop header ── */
    .shop-header { margin-bottom: 24px; }

    /* ── section layout ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .section-title { font-size: 1.1rem; color: #33cc66; letter-spacing: 0.5px; }

    .card-row { display: flex; gap: 14px; flex-wrap: wrap; }

    .section-divider {
      border: none;
      border-top: 1px solid #182018;
      margin: 28px 0;
    }

    /* ── base card ── */
    .card {
      background:
        radial-gradient(ellipse 70% 50% at 50% 75%, rgba(0, 120, 50, 0.22) 0%, transparent 100%),
        radial-gradient(ellipse 30% 25% at 50% 90%, rgba(180, 130, 40, 0.15) 0%, transparent 100%),
        linear-gradient(180deg, #0a100a 0%, #080c06 50%, #060a04 100%);
      border: 1px solid #1e2e1a;
      border-radius: 8px;
      padding: 18px 14px;
      width: 155px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
    }
    .card:hover { z-index: 10; }

    .card-art {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 80%;
      object-fit: contain;
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    .card-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      flex: 1;
    }

    /* ── shop card states ── */
    .shop-card:not(.sold):not(.unaffordable) { border-color: #1e3a1e; }
    .shop-card.sold         { opacity: 0.35; }
    .shop-card.unaffordable { opacity: 0.6; }

    /* ── hero card ── */
    .hero-card {
      border-color: #c9a84c;
      background:
        radial-gradient(ellipse 60% 50% at 50% 65%, rgba(190, 145, 35, 0.45) 0%, transparent 100%),
        radial-gradient(ellipse 40% 30% at 50% 15%, rgba(50, 110, 220, 0.25) 0%, transparent 100%),
        linear-gradient(180deg, #0c0a02 0%, #120e04 60%, #0a0802 100%);
    }

    /* ── per-boss art ── */
    .boss-art-0 { /* Corrupted Node */
      background:
        radial-gradient(ellipse 70% 45% at 50% 80%, rgba(50, 180, 30, 0.55) 0%, transparent 100%),
        radial-gradient(ellipse 40% 30% at 25% 50%, rgba(80, 200, 40, 0.2) 0%, transparent 100%),
        linear-gradient(180deg, #030c01 0%, #061202 60%, #030c01 100%);
    }
    .boss-art-1 { /* Security Drone */
      background:
        radial-gradient(ellipse 65% 45% at 50% 75%, rgba(130, 80, 30, 0.55) 0%, transparent 100%),
        radial-gradient(ellipse 50% 35% at 70% 40%, rgba(80, 50, 20, 0.3) 0%, transparent 100%),
        linear-gradient(180deg, #0c0602 0%, #140802 60%, #0a0502 100%);
    }
    .boss-art-2 { /* Hive Controller */
      background:
        radial-gradient(ellipse 55% 55% at 50% 55%, rgba(40, 150, 200, 0.3) 0%, transparent 100%),
        radial-gradient(ellipse 40% 30% at 70% 25%, rgba(20, 100, 180, 0.35) 0%, transparent 100%),
        linear-gradient(180deg, #020c10 0%, #041018 60%, #020c10 100%);
    }
    .boss-art-3 { /* Combat Mech */
      background:
        radial-gradient(ellipse 60% 40% at 50% 60%, rgba(150, 155, 175, 0.4) 0%, transparent 100%),
        radial-gradient(ellipse 30% 25% at 80% 80%, rgba(80, 90, 110, 0.25) 0%, transparent 100%),
        linear-gradient(180deg, #07080e 0%, #0c0c14 60%, #07080e 100%);
    }
    .boss-art-4 { /* Stealth Cruiser */
      background:
        radial-gradient(ellipse 65% 50% at 50% 65%, rgba(30, 50, 200, 0.5) 0%, transparent 100%),
        radial-gradient(ellipse 35% 30% at 20% 30%, rgba(100, 40, 180, 0.3) 0%, transparent 100%),
        linear-gradient(180deg, #020412 0%, #030614 60%, #020310 100%);
    }
    .boss-art-5 { /* Synthetic Overlord */
      background:
        radial-gradient(ellipse 55% 55% at 50% 65%, rgba(0, 180, 80, 0.35) 0%, transparent 100%),
        radial-gradient(ellipse 45% 35% at 30% 30%, rgba(0, 120, 60, 0.35) 0%, transparent 100%),
        linear-gradient(180deg, #020c04 0%, #040e06 60%, #020c04 100%);
    }
    .boss-art-6 { /* Quantum Titan */
      background:
        radial-gradient(ellipse 45% 45% at 50% 50%, rgba(90, 15, 160, 0.6) 0%, transparent 100%),
        radial-gradient(ellipse 15% 15% at 35% 35%, rgba(220, 220, 255, 0.12) 0%, transparent 100%),
        radial-gradient(ellipse 15% 15% at 65% 65%, rgba(220, 220, 255, 0.08) 0%, transparent 100%),
        linear-gradient(180deg, #010108 0%, #030110 60%, #010108 100%);
    }
    .boss-art-7 { /* The Architect */
      background:
        radial-gradient(ellipse 75% 65% at 50% 75%, rgba(220, 60, 10, 0.6) 0%, transparent 100%),
        radial-gradient(ellipse 40% 30% at 50% 95%, rgba(240, 180, 20, 0.45) 0%, transparent 100%),
        linear-gradient(180deg, #0e0302 0%, #160402 60%, #0e0302 100%);
    }
    .hero-name { color: #33cc66; }
    .card-ability {
      font-size: 0.72rem;
      color: #2aaa55;
      font-style: italic;
      text-align: center;
      line-height: 1.4;
      border-top: 1px solid #0a1e0a;
      padding-top: 8px;
      width: 100%;
    }

    .card-name      { font-size: 0.95rem; text-align: center; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
    .card-stats-row { display: flex; gap: 14px; font-size: 0.9rem; }
    .card-cost      { font-size: 0.85rem; color: #c9a84c; }
    .sold-label     { font-size: 0.78rem; color: #445544; font-style: italic; }

    /* ── buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 7px 16px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 0.88rem;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn-buy { background: #1a3a1a; color: #80c880; margin-top: auto; width: 100%; }
    .btn-buy:hover:not(:disabled)       { background: #2a5a2a; }
    .btn-remove { background: #4a1a1a; color: #d4a0a0; margin-top: 4px; width: 100%; }
    .btn-remove:hover:not(:disabled)    { background: #6a2a2a; }
    .btn-heal { background: #1a3a4a; color: #a0ccd4; margin-top: 4px; width: 100%; }
    .btn-heal:hover:not(:disabled)      { background: #2a5a6a; }
    .btn-secondary { background: #1a2a1a; color: #6aaa7a; }
    .btn-secondary:hover:not(:disabled) { background: #243624; }
    .btn-proceed {
      background: #5a2020;
      color: #d4a0a0;
      padding: 10px 28px;
      font-size: 1rem;
    }
    .btn-proceed:hover { background: #7a3030; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── footer ── */
    .footer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 36px;
    }

    /* ── battle screen ── */
    .battle-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
    }
    .battle-boss-name { font-size: 1.5rem; font-weight: bold; }
    .battle-boss-num  { font-size: 0.85rem; color: #445544; }

    .field {
      display: flex;
      gap: 14px;
      justify-content: center;
    }

    .slot {
      width: 155px;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .empty-slot {
      border: 2px dashed #182018;
      border-radius: 8px;
      background: #070a07;
    }

    .player-empty {
      border-color: #182018;
      background: #070a07;
    }

    .battle-vs {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 0;
    }

    .btn-fight {
      background: #3a1a1a;
      color: #c07070;
      border: 1px solid #6a2a2a;
      padding: 10px 36px;
      font-size: 1rem;
      border-radius: 4px;
      letter-spacing: 1px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-fight:not(:disabled):hover {
      background: #6a2020;
      border-color: #aa4040;
      color: #e09090;
      cursor: pointer;
    }
    .btn-fight:disabled {
      background: #111411;
      border-color: #1e281e;
      color: #3a4a3a;
      cursor: not-allowed;
    }

    .boss-card  { border-color: #7a1818; }
    .enemy-card { border-color: #5a1818; }

    .card[draggable="true"] { cursor: grab; }
    .card[draggable="true"]:active { cursor: grabbing; }

    /* ── field card (big stats only, pushed to bottom) ── */
    .battle-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-top: auto;
    }
    .battle-atk      { font-size: 1.7rem; color: #5599dd; font-weight: bold; line-height: 1; display: inline-block; }
    .battle-hp       { font-size: 1.7rem; color: #e05555; font-weight: bold; line-height: 1; display: inline-block; }
    .battle-failsafe { font-size: 1rem; line-height: 1; opacity: 0.85; }
    .battle-extract  { font-size: 1rem; line-height: 1; opacity: 0.85; }

    .card-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #080e08;
      border: 1px solid #1a3a1a;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #b0ccb0;
      z-index: 100;
      pointer-events: none;
      line-height: 1.6;
      min-width: 190px;
      max-width: 260px;
      white-space: normal;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
      text-align: left;
    }
    .card-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #1a3a1a;
    }
    .card:hover .card-tooltip { display: block; }
    .tooltip-name {
      display: block;
      font-size: 0.88rem;
      font-weight: bold;
      color: #d0e8d0;
      margin-bottom: 6px;
    }
    .tooltip-effect { color: #40cc70; font-style: italic; }

    @keyframes stat-buff {
      0%   { transform: scale(1);    filter: brightness(1);   }
      25%  { transform: scale(2.2);  filter: brightness(2) drop-shadow(0 0 6px #ffe066); }
      60%  { transform: scale(1.4);  filter: brightness(1.5) drop-shadow(0 0 3px #ffe066); }
      100% { transform: scale(1);    filter: brightness(1);   }
    }
    .stat-buff-anim {
      animation: stat-buff 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      display: inline-block;
    }

    @keyframes impact-burst {
      0%   { transform: scale(0.1); opacity: 1;   }
      35%  { transform: scale(1.1); opacity: 0.9; }
      100% { transform: scale(2);   opacity: 0;   }
    }
    @keyframes impact-ring {
      0%   { transform: scale(0.1); opacity: 0.9; }
      100% { transform: scale(2.2); opacity: 0;   }
    }
    .impact-burst, .impact-ring {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
      border-radius: 50%;
    }
    .impact-burst {
      background: radial-gradient(circle, var(--impact-color, #44cc66) 0%, transparent 70%);
      animation: impact-burst 0.32s ease-out forwards;
    }
    .impact-ring {
      border: 3px solid var(--impact-color, #44cc66);
      background: transparent;
      animation: impact-ring 0.38s ease-out forwards;
    }

    @keyframes hp-damage {
      0%   { transform: scale(1);   filter: brightness(1);   }
      20%  { transform: scale(1.9); filter: brightness(2.5) drop-shadow(0 0 6px #ff3333); }
      55%  { transform: scale(1.3); filter: brightness(1.6) drop-shadow(0 0 3px #ff4444); }
      100% { transform: scale(1);   filter: brightness(1);   }
    }
    .hp-damage-anim {
      animation: hp-damage 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      display: inline-block;
    }

    .card.selected {
      outline: 2px solid #c9a84c;
      outline-offset: 3px;
    }

    .slot.playable {
      border-color: #2a5a2a;
      cursor: pointer;
    }
    .slot.playable:hover {
      border-color: #4aaa4a;
      background: #071007;
    }

    /* ── battle layout ── */
    .battle-layout {
      display: flex;
      align-items: flex-end;
      gap: 28px;
    }
    .battle-main   { flex: 1; min-width: 0; }
    .battle-sidebar { flex-shrink: 0; width: 155px; }

    .deck-pile {
      background: #0a120a;
      border-color: #1e441e;
      box-shadow: 4px 4px 0 #080e08, 8px 8px 0 #060a06;
      justify-content: center;
    }
    .deck-count { font-size: 1.4rem; color: #3a8a4a; }

    .deck-empty {
      border: 2px dashed #7a1818;
      border-radius: 8px;
      background: #130606;
    }

    /* ── hand area ── */
    .hand-area {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #141e14;
    }
    .hand-meta {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 14px;
    }
    .hand-label { font-size: 1.1rem; color: #33cc66; }
    .hand-field { flex-wrap: wrap; }

    /* ── battle log ── */
    .battle-log {
      margin-top: 20px;
      padding: 10px 14px;
      background: #050908;
      border: 1px solid #142014;
      border-radius: 6px;
      min-height: 60px;
      font-family: 'Courier New', 'Consolas', monospace;
    }
    .log-entry {
      font-size: 0.82rem;
      color: #5a7a5a;
      padding: 2px 0;
    }
    .log-entry:last-child { color: #b0ccb0; }
    .log-empty { font-size: 0.8rem; color: #3a4a3a; font-style: italic; }

    /* ── end screens ── */
    .end-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding-top: 80px;
    }

    /* ── reward screen ── */
    .reward-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding-top: 40px;
    }

    .reward-choices {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .reward-option {
      background: #0e120e;
      border: 2px solid #1e2e1a;
      border-radius: 12px;
      padding: 32px 20px 20px;
      width: 210px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
    }
    .reward-option:hover { transform: translateY(-5px); }

    .relic-reward  { border-color: #1a5a3a; background: #080e0a; }
    .relic-reward:hover  { border-color: #2a8a5a; background: #0a1410; }

    .card-reward   { border-color: #1a3a2a; background: #060e0a; }
    .card-reward:hover   { border-color: #2a6a4a; background: #081410; }

    .effect-reward { border-color: #7a5818; background: #100e08; }
    .effect-reward:hover { border-color: #c9943a; background: #191408; }

    .reward-type-badge {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 12px;
      border-radius: 10px;
      font-weight: bold;
      white-space: nowrap;
    }
    .badge-relic  { background: #1a4a2a; color: #80d0a0; }
    .badge-card   { background: #0a3a2a; color: #70ccaa; }
    .badge-effect { background: #5a3a08; color: #d4a860; }

    .reward-glyph { font-size: 2.2rem; margin-top: 4px; }
    .relic-color  { color: #40cc70; }
    .effect-color { color: #c9943a; }

    .reward-name {
      font-size: 1.05rem;
      text-align: center;
      color: #d0e8d0;
    }

    .reward-desc {
      font-size: 0.8rem;
      color: #6a8a6a;
      text-align: center;
      line-height: 1.5;
      font-style: italic;
      flex: 1;
    }

    .btn-choose {
      background: #1a2a1a;
      color: #6aaa7a;
      padding: 7px 0;
      border-radius: 4px;
      width: 100%;
      margin-top: 4px;
      font-family: Georgia, serif;
      font-size: 0.88rem;
      transition: background 0.15s;
    }
    .btn-choose:hover { background: #243624; color: #90cc90; }

    /* ── relic cards in shop ── */
    .relic-card {
      border-color: #1a5a3a;
      background: #080e0a;
    }
    .relic-glyph { font-size: 1.4rem; color: #40cc70; }
    .relic-name  { color: #80ccaa; }
    .relic-ability {
      border-top-color: #0a1e10;
      color: #5aaa70;
    }

    /* ── unlock screen ── */
    .unlock-cards {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .unlock-card-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .unlock-count {
      font-size: 0.8rem;
      color: #33cc66;
      letter-spacing: 0.5px;
    }

    /* ── title screen ── */
    .title-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 36px;
    }

    .facility-id {
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: #3a5a3a;
      text-transform: uppercase;
      border: 1px solid #1a3a1a;
      padding: 4px 18px;
      border-radius: 2px;
    }

    .game-title {
      font-size: 5.5rem;
      font-weight: bold;
      color: #33cc66;
      text-shadow:
        0 0 30px rgba(51, 204, 102, 0.5),
        0 0 70px rgba(51, 204, 102, 0.2),
        0 0 120px rgba(51, 204, 102, 0.1);
      letter-spacing: 10px;
      line-height: 1.1;
      text-align: center;
    }

    .title-lore {
      color: #5a7a5a;
      font-size: 0.88rem;
      text-align: center;
      line-height: 2;
      max-width: 400px;
    }

    .btn-start {
      background: transparent;
      border: 1px solid #33cc66;
      color: #33cc66;
      padding: 12px 52px;
      font-size: 0.9rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      font-family: 'Segoe UI', system-ui, sans-serif;
      border-radius: 2px;
    }
    .btn-start:hover {
      background: rgba(51, 204, 102, 0.07);
      box-shadow: 0 0 24px rgba(51, 204, 102, 0.2);
    }

    .title-credit {
      font-size: 0.68rem;
      color: #2a4a2a;
      position: fixed;
      bottom: 16px;
    }

    /* ── pool debug tooltip ── */
    .pool-debug {
      position: relative;
      font-size: 0.78rem;
      color: #3a4a3a;
      cursor: default;

      padding: 8px 12px;

    .pool-tooltip-row:last-child { border-bottom: none; }

    .pool-tooltip-stats { color: #5a7a5a; font-size: 0.72rem; }
    .pool-tooltip-kw {

      color: #40cc70;
      border: 1px solid #1a4028;
