<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dungeon Crawler 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      color: #e0e0e0;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    #app { width: 100%; max-width: 1100px; }

    #home-link {
      position: fixed;
      top: 12px;
      left: 14px;
      color: #333;
      font-size: 0.8rem;
      text-decoration: none;
    }
    #home-link:hover { color: #888; }

    /* ── hud ── */
    .hud {
      position: fixed;
      top: 48px;
      right: 64px;
      display: flex;
      gap: 48px;
      z-index: 100;
    }
    .hud-resource {
      font-size: 3rem;
      color: #c9a84c;
      cursor: default;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .coin {
      display: inline-block;
      width: 0.7em;
      height: 0.7em;
      background: radial-gradient(circle at 35% 35%, #f0d060, #c9a84c 55%, #8a6a20);
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── screens ── */
    .screen { padding: 24px 0 60px; }

    .title {
      font-size: 2rem;
      text-align: center;
      color: #c9a84c;
      margin-bottom: 6px;
    }
    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 30px;
    }
    .section-title { font-size: 1.1rem; color: #c9a84c; }

    .gold  { color: #c9a84c; }
    .red   { color: #d95555; }
    .hp-stat  { color: #e05555; }
    .atk-stat { color: #5599dd; }

    /* ── shop header ── */
    .shop-header { margin-bottom: 24px; }

    /* ── section layout ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }
    .section-title { font-size: 1.1rem; color: #c9a84c; }

    .card-row { display: flex; gap: 14px; flex-wrap: wrap; }

    .section-divider {
      border: none;
      border-top: 1px solid #1e1e38;
      margin: 28px 0;
    }

    /* ── base card ── */
    .card {
      background: #111122;
      border: 1px solid #2a2a55;
      border-radius: 8px;
      padding: 18px 14px;
      width: 155px;
      min-height: 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* ── shop card states ── */
    .shop-card:not(.sold):not(.unaffordable) { border-color: #3a3a7a; }
    .shop-card.sold         { opacity: 0.35; }
    .shop-card.unaffordable { opacity: 0.6; }

    /* ── hero card ── */
    .hero-card {
      border-color: #c9a84c;
      background: #131208;
    }
    .hero-name { color: #c9a84c; }
    .card-ability {
      font-size: 0.72rem;
      color: #a08840;
      font-style: italic;
      text-align: center;
      line-height: 1.4;
      border-top: 1px solid #2a240a;
      padding-top: 8px;
      width: 100%;
    }

    .card-name      { font-size: 0.95rem; text-align: center; }
    .card-stats-row { display: flex; gap: 14px; font-size: 0.9rem; }
    .card-cost      { font-size: 0.85rem; color: #c9a84c; }
    .sold-label     { font-size: 0.78rem; color: #555; font-style: italic; }

    /* ── buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 7px 16px;
      font-family: Georgia, serif;
      font-size: 0.88rem;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn-buy { background: #2d5a2d; color: #a8d4a8; }
    .btn-buy:hover:not(:disabled)       { background: #3a7a3a; }
    .btn-secondary { background: #252545; color: #9090c0; }
    .btn-secondary:hover:not(:disabled) { background: #333365; }
    .btn-proceed {
      background: #5a2020;
      color: #d4a0a0;
      padding: 10px 28px;
      font-size: 1rem;
    }
    .btn-proceed:hover { background: #7a3030; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── footer ── */
    .footer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 36px;
    }

    /* ── battle screen ── */
    .battle-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
    }
    .battle-boss-name { font-size: 1.5rem; font-weight: bold; }
    .battle-boss-num  { font-size: 0.85rem; color: #555; }

    .field {
      display: flex;
      gap: 14px;
      justify-content: center;
    }

    .slot {
      width: 155px;
      min-height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .empty-slot {
      border: 2px dashed #1e1e36;
      border-radius: 8px;
      background: #09090f;
    }

    .player-empty {
      border-color: #1e2e1e;
      background: #090f09;
    }

    .battle-vs {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px 0;
    }

    .btn-fight {
      background: #3a1a1a;
      color: #c07070;
      border: 1px solid #6a2a2a;
      padding: 10px 36px;
      font-size: 1rem;
      border-radius: 4px;
      letter-spacing: 1px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .btn-fight:not(:disabled):hover {
      background: #6a2020;
      border-color: #aa4040;
      color: #e09090;
      cursor: pointer;
    }
    .btn-fight:disabled {
      background: #1a1a1a;
      border-color: #2a2a2a;
      color: #444;
      cursor: not-allowed;
    }

    .boss-card  { border-color: #7a1818; background: #110606; }
    .enemy-card { border-color: #5a1818; background: #0f0606; }

    .card[draggable="true"] { cursor: grab; }
    .card[draggable="true"]:active { cursor: grabbing; }

    .card.selected {
      outline: 2px solid #c9a84c;
      outline-offset: 3px;
    }

    .slot.playable {
      border-color: #3a6a3a;
      cursor: pointer;
    }
    .slot.playable:hover {
      border-color: #5aaa5a;
      background: #0a130a;
    }

    /* ── battle layout ── */
    .battle-layout {
      display: flex;
      align-items: flex-end;
      gap: 28px;
    }
    .battle-main   { flex: 1; min-width: 0; }
    .battle-sidebar { flex-shrink: 0; width: 155px; }

    .deck-pile {
      background: #12122a;
      border-color: #44448a;
      box-shadow: 4px 4px 0 #0e0e22, 8px 8px 0 #0a0a1a;
      justify-content: center;
    }
    .deck-count { font-size: 1.4rem; color: #6060a0; }

    .deck-empty {
      border: 2px dashed #7a1818;
      border-radius: 8px;
      background: #130606;
    }

    /* ── hand area ── */
    .hand-area {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid #1a1a30;
    }
    .hand-meta {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 14px;
    }
    .hand-label { font-size: 1.1rem; color: #c9a84c; }

    /* ── battle log ── */
    .battle-log {
      margin-top: 20px;
      padding: 10px 14px;
      background: #080810;
      border: 1px solid #18182a;
      border-radius: 6px;
      min-height: 60px;
    }
    .log-entry {
      font-size: 0.82rem;
      color: #888;
      padding: 2px 0;
    }
    .log-entry:last-child { color: #c0c0d0; }
    .log-empty { font-size: 0.8rem; color: #333; font-style: italic; }

    /* ── end screens ── */
    .end-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding-top: 80px;
    }

    /* ── reward screen ── */
    .reward-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding-top: 40px;
    }

    .reward-choices {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .reward-option {
      background: #111122;
      border: 2px solid #2a2a55;
      border-radius: 12px;
      padding: 32px 20px 20px;
      width: 210px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      position: relative;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
    }
    .reward-option:hover { transform: translateY(-5px); }

    .relic-reward  { border-color: #6a3a9a; background: #0e0a14; }
    .relic-reward:hover  { border-color: #9a60cc; background: #130f1c; }

    .card-reward   { border-color: #2a5a8a; background: #080e14; }
    .card-reward:hover   { border-color: #4a8abf; background: #0c1420; }

    .effect-reward { border-color: #7a5818; background: #100e08; }
    .effect-reward:hover { border-color: #c9943a; background: #191408; }

    .reward-type-badge {
      position: absolute;
      top: -13px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 12px;
      border-radius: 10px;
      font-weight: bold;
      white-space: nowrap;
    }
    .badge-relic  { background: #4a2a7a; color: #c0a0e0; }
    .badge-card   { background: #1a3a5a; color: #80b0d4; }
    .badge-effect { background: #5a3a08; color: #d4a860; }

    .reward-glyph { font-size: 2.2rem; margin-top: 4px; }
    .relic-color  { color: #a060d0; }
    .effect-color { color: #c9943a; }

    .reward-name {
      font-size: 1.05rem;
      text-align: center;
      color: #e0e0e0;
    }

    .reward-desc {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      line-height: 1.5;
      font-style: italic;
      flex: 1;
    }

    .btn-choose {
      background: #252545;
      color: #9090c0;
      padding: 7px 0;
      border-radius: 4px;
      width: 100%;
      margin-top: 4px;
      font-family: Georgia, serif;
      font-size: 0.88rem;
      transition: background 0.15s;
    }
    .btn-choose:hover { background: #353568; color: #b0b0e0; }

    /* ── relic cards in shop ── */
    .relic-card {
      border-color: #6a3a9a;
      background: #0e0a14;
    }
    .relic-glyph { font-size: 1.4rem; color: #a060d0; }
    .relic-name  { color: #c090e0; }
    .relic-ability {
      border-top-color: #2a1a3a;
      color: #9070b0;
    }
  </style>
</head>
<body>
  <a id="home-link" href="../index.html">← Home</a>
  <div id="app"></div>
  <script src="game.js"></script>
</body>
</html>
